<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Book a Meeting — DAC · DGU AI Cell</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#080810;
  --black-mid:#0F0F1A;
  --purple:#7C3AED;
  --purple-border:rgba(124,58,237,.28);
  --white:#F8F8FF;
  --muted:#7A7A9A;
}
body{
  background:var(--black);
  color:var(--white);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
}
.page-bg{
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 30%, rgba(124,58,237,.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 70%, rgba(124,58,237,.06) 0%, transparent 70%),
    var(--black);
}
nav{
  position:fixed;
  top:0;left:0;width:100%;
  padding:1rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  backdrop-filter:blur(20px);
  background:rgba(8,8,16,.9);
  border-bottom:1px solid rgba(124,58,237,.2);
  z-index:100;
}
.nav-back{
  color:white;
  text-decoration:none;
  border:1px solid rgba(124,58,237,.2);
  padding:.7rem 1rem;
}
main{
  position:relative;
  z-index:1;
  padding:120px 20px 40px;
}
.container{
  max-width:1000px;
  margin:auto;
}
.page-header{
  text-align:center;
  margin-bottom:40px;
}
.page-title{
  font-family:'Cormorant Garamond',serif;
  font-size:3rem;
  font-weight:300;
}
.page-sub{
  color:var(--muted);
  max-width:650px;
  margin:15px auto;
  line-height:1.8;
}
.form-card{
  background:var(--black-mid);
  border:1px solid var(--purple-border);
  border-top:3px solid var(--purple);
  padding:30px;
}
</style>
</head>

<body>

<div class="page-bg"></div>

<nav>
  <a href="index.html" class="nav-back">← Back</a>
  <div>DAC — DGU AI Cell</div>
  <div></div>
</nav>

<main>
  <div class="container">

    <div class="page-header">
      <h1 class="page-title">Book a Meeting</h1>
      <p class="page-sub">
        Choose a suitable date and time below. During the booking process
        you can enter your meeting subject and any additional details.
      </p>
    </div>

    <div class="form-card">

      <div class="calendly-inline-widget"
           data-url="https://calendly.com/tushar-srivastava-dgu"
           style="min-width:320px;height:800px;">
      </div>

      <script src="https://assets.calendly.com/assets/external/widget.js" async></script>

    </div>

  </div>
</main>

</body>
</html>
